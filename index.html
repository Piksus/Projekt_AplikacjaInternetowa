<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventManager - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div>
                    <h1>EventManager</h1>
                    <p>Panel zarządzania wydarzeniami</p>
                </div>
                <button class="nav-toggle" id="navToggle">&#9776;</button>
            </div>
        </header>

        <nav>
            <ul id="navMenu">
                <li><a href="#dashboard" class="nav-link">Dashboard <span id="eventCount">0</span></a></li>
                <li><a href="#events" class="nav-link">Wydarzenia</a></li>
            </ul>
        </nav>

        <main id="mainContent"></main>
    </div>

    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h3>Dodaj wydarzenie</h3>
            <form id="addEventForm">
                <div class="form-group">
                    <label for="evTitle">Nazwa *</label>
                    <input type="text" id="evTitle" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evDate">Data *</label>
                    <input type="date" id="evDate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evLocation">Miejsce *</label>
                    <input type="text" id="evLocation" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evDesc">Opis</label>
                    <textarea id="evDesc" class="form-input" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Dodaj</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
