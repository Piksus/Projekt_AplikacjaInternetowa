<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventManager - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>EventManager</h1>
                <p>Panel zarządzania wydarzeniami</p>
            </div>
        </header>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Dashboard</a></li>
                <li><a href="events.html">Wydarzenia</a></li>
            </ul>
        </nav>
        <main>
            <section>
                <h2>Dashboard</h2>
                <div class="stats" id="stats"></div>
            </section>
            <section>
                <h2>Ostatnie wydarzenia</h2>
                <div class="events-grid" id="recentEvents"></div>
                <p style="text-align:center;margin-top:16px"><a href="events.html" class="btn btn-primary">Zobacz wszystkie</a></p>
            </section>
            <section>
                <div class="card-header"><h2>Wszystkie zadania</h2>
                    <select id="taskFilterEvent" class="form-input filter-select task-filter-select"></select>
                </div>
                <div id="allTasksList" class="all-tasks"></div>
            </section>
        </main>
    </div>
    <script src="js/store.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
