<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventManager - Wydarzenia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>EventManager</h1>
                <p>Lista wydarzeń</p>
            </div>
        </header>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="events.html" class="active">Wydarzenia</a></li>
            </ul>
        </nav>
        <main>
            <section>
                <div class="card-header">
                    <h2>Wydarzenia</h2>
                    <button class="btn btn-primary btn-sm" id="addEventBtn">+ Dodaj event</button>
                </div>
                <div class="filters">
                    <input type="text" id="searchInput" class="form-input filter-input" placeholder="Szukaj wydarzenia...">
                    <select id="statusFilter" class="form-input filter-select">
                        <option value="all">Wszystkie</option>
                        <option value="active">Aktywne</option>
                        <option value="planned">Planowane</option>
                    </select>
                </div>
                <div class="events-grid" id="eventsGrid"></div>
            </section>
        </main>
    </div>

    <div id="addEventModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h3>Dodaj wydarzenie</h3>
            <form id="addEventForm">
                <div class="form-group">
                    <label for="evTitle">Nazwa *</label>
                    <input type="text" id="evTitle" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evDate">Data *</label>
                    <input type="date" id="evDate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evLocation">Miejsce *</label>
                    <input type="text" id="evLocation" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="evDesc">Opis</label>
                    <textarea id="evDesc" class="form-input" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Dodaj</button>
            </form>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
